<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Coffee | Order Online</title>
    <style>
        :root {
            --light-blue: #E3F2FD;
            --header-blue: #0288D1;
            --accent-yellow: #FFEB3B;
            --dark-blue: #01579B;
            --white: #ffffff;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-blue); color: var(--text); line-height: 1.6; }

        header { background-color: var(--header-blue); color: var(--white); padding: 2rem 0; text-align: center; border-bottom: 5px solid var(--accent-yellow); }
        nav { background-color: var(--dark-blue); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center; gap: 20px; }
        nav a { color: var(--white); text-decoration: none; font-weight: bold; cursor: pointer; }
        
        .basket-btn { background: var(--accent-yellow); color: var(--dark-blue); padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 20px; }
        .category-title { color: var(--dark-blue); margin: 3rem 0 1rem; padding-bottom: 10px; border-bottom: 3px solid var(--accent-yellow); text-transform: uppercase; letter-spacing: 1px; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .menu-item { background: var(--white); padding: 1.2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .menu-item h3 { font-size: 1.1rem; color: var(--header-blue); margin-bottom: 5px; }
        .menu-item p { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .price { font-weight: bold; color: var(--dark-blue); margin-bottom: 10px; display: block; }

        .add-btn { background: var(--light-blue); color: var(--dark-blue); border: 1px solid var(--header-blue); padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background: var(--header-blue); color: white; }
        .btn-checkout { background: var(--header-blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }

        #basket-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--white); padding: 2rem; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; display: flex; flex-direction: column; }
        #basket-items-list { overflow-y: auto; flex-grow: 1; margin: 15px 0; border-top: 1px solid #eee; }
        .basket-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }

        .hidden { display: none; }
        .card { background: white; padding: 2rem; border-radius: 15px; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>ACP Coffee</h1>
        <p>Expertly Roasted. Delivered Fresh.</p>
    </header>

    <nav>
        <a onclick="showSection('menu-section')">Menu</a>
        <button class="basket-btn" onclick="toggleBasket()">🛒 Basket (£<span id="basket-total-nav">0.00</span>)</button>
    </nav>

    <div class="container">
        
        <section id="menu-section">
            <h2 class="category-title">Brews & Drinks</h2>
            <div class="menu-grid" id="coffee-grid"></div>

            <h2 class="category-title">Fresh Bakery</h2>
            <div class="menu-grid" id="bakery-grid"></div>

            <h2 class="category-title">Brunch Specials</h2>
            <div class="menu-grid" id="brunch-grid"></div>
        </section>

        <!-- Checkout Sections -->
        <section id="address-section" class="hidden">
            <h2 class="section-title" style="text-align: center; margin: 2rem;">Delivery Details</h2>
            <div class="card">
                <input type="text" id="custName" placeholder="Full Name">
                <input type="text" id="custAddress" placeholder="Street Address, London, UK">
                <button class="btn-checkout" onclick="showSection('payment-section')">Continue to Payment</button>
            </div>
        </section>

        <section id="payment-section" class="hidden">
            <h2 class="section-title" style="text-align: center; margin: 2rem;">Secure Payment</h2>
            <div class="card">
                <p>Total to Pay: <strong id="pay-total"></strong></p>
                <input type="text" placeholder="Card Number" maxlength="16">
                <div style="display:flex; gap:10px;">
                    <input type="text" placeholder="MM/YY" maxlength="5">
                    <input type="text" placeholder="CVV" maxlength="3">
                </div>
                <button class="btn-checkout" style="background:#2ecc71" onclick="processPayment()">Pay Now</button>
            </div>
        </section>

        <section id="success-page" class="hidden" style="text-align:center; padding: 4rem 0;">
            <h1 style="color:#2ecc71; font-size: 3rem;">☕ Cheers!</h1>
            <p>Payment successful. Your order is being prepared.</p>
            <div style="background:var(--accent-yellow); display:inline-block; padding: 1rem 2rem; border-radius: 50px; margin: 2rem 0; font-weight:bold;">
                Estimated Delivery: 25 Minutes
            </div>
            <br>
            <button class="btn-checkout" style="width:200px" onclick="location.reload()">New Order</button>
        </section>

    </div>

    <!-- Basket Modal -->
    <div id="basket-modal">
        <div class="modal-content">
            <h2 style="color: var(--dark-blue);">Current Basket</h2>
            <div id="basket-items-list"></div>
            <div style="padding-top: 15px; font-size: 1.2rem;">
                <strong>Total: £<span id="basket-total-price">0.00</span></strong>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 1rem;">
                <button class="btn-checkout" style="background:#888" onclick="toggleBasket()">Close</button>
                <button class="btn-checkout" onclick="startCheckout()">Checkout</button>
            </div>
        </div>
    </div>

    <script>
        const menuData = {
            brews: [
                {n: "Espresso", p: 2.20, d: "Rich and dark."},
                {n: "Americano", p: 2.80, d: "Espresso over hot water."},
                {n: "Cappuccino", p: 3.50, d: "Classic frothy coffee."},
                {n: "Flat White", p: 3.40, d: "Velvety smooth milk."},
                {n: "Vanilla Latte", p: 3.95, d: "Sweet Madagascar vanilla."},
                {n: "Caramel Macchiato", p: 4.10, d: "Sweet caramel drizzle."},
                {n: "Mocha", p: 4.00, d: "Chocolate & espresso blend."},
                {n: "Cold Brew", p: 3.80, d: "Slow-steeped for 12 hours."},
                {n: "Iced Matcha Latte", p: 4.50, d: "Pure ceremonial grade."},
                {n: "Chai Latte", p: 3.90, d: "Spiced aromatic tea."},
                {n: "Hot Chocolate", p: 3.50, d: "Premium cocoa with cream."},
                {n: "Earl Grey", p: 2.50, d: "Premium loose leaf tea."}
            ],
            bakery: [
                {n: "Butter Croissant", p: 2.95, d: "Flaky and golden."},
                {n: "Almond Croissant", p: 3.50, d: "Sweet almond filling."},
                {n: "Pain au Chocolat", p: 3.20, d: "Double chocolate center."},
                {n: "Blueberry Muffin", p: 2.80, d: "Freshly baked today."},
                {n: "Banana Bread", p: 3.00, d: "Toasted with salted butter."},
                {n: "Cinnamon Swirl", p: 3.40, d: "Gooey icing topper."},
                {n: "Lemon Cake Slice", p: 3.20, d: "Zesty lemon drizzle."},
                {n: "Choc Chip Cookie", p: 1.95, d: "Soft and chewy."},
                {n: "Fruit Scone", p: 3.50, d: "Clotted cream & jam."},
                {n: "Shortbread", p: 1.50, d: "Traditional buttery biscuit."}
            ],
            brunch: [
                {n: "Avocado on Toast", p: 8.50, d: "Poached eggs & chili flakes."},
                {n: "Full ACP Breakfast", p: 10.95, d: "The works, on one plate."},
                {n: "Blueberry Pancakes", p: 8.95, d: "Maple syrup stack."},
                {n: "Salmon Bagel", p: 7.50, d: "Cream cheese and dill."},
                {n: "Bacon Brioche", p: 4.95, d: "Crispy smoked bacon."},
                {n: "Granola Bowl", p: 6.50, d: "Yogurt and fresh berries."},
                {n: "Halloumi Wrap", p: 7.25, d: "Roasted peppers and pesto."},
                {n: "Breakfast Burrito", p: 8.50, d: "Eggs, avocado, and salsa."}
            ]
        };

        let cart = [];

        function initMenu() {
            renderGrid('coffee-grid', menuData.brews);
            renderGrid('bakery-grid', menuData.bakery);
            renderGrid('brunch-grid', menuData.brunch);
        }

        function renderGrid(id, items) {
            const grid = document.getElementById(id);
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="menu-item">
                        <div>
                            <h3>${item.n}</h3>
                            <p>${item.d}</p>
                        </div>
                        <div>
                            <span class="price">£${item.p.toFixed(2)}</span>
                            <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">Add to Order</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('basket-items-list');
            const totalNav = document.getElementById('basket-total-nav');
            const totalPrice = document.getElementById('basket-total-price');
            const payTotal = document.getElementById('pay-total');
            
            let total = 0;
            list.innerHTML = "";
            cart.forEach(item => {
                list.innerHTML += `<div class="basket-item"><span>${item.name}</span><span>£${item.price.toFixed(2)}</span></div>`;
                total += item.price;
            });
            
            totalNav.innerText = total.toFixed(2);
            totalPrice.innerText = total.toFixed(2);
            payTotal.innerText = "£" + total.toFixed(2);
        }

        function toggleBasket() {
            const m = document.getElementById('basket-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function startCheckout() {
            if(cart.length === 0) return alert("Basket is empty!");
            toggleBasket();
            showSection('address-section');
        }

        function processPayment() {
            showSection('success-page');
        }

        initMenu();
    </script>
</body>
</html>
